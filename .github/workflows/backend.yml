name: Backend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint 2>&1 | tee /tmp/backend-lint.log; exit ${PIPESTATUS[0]}
      - name: Notificar lint
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Análisis Estático Backend (ESLint)%0AEstado: ${ESTADO}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test 2>&1 | tee /tmp/backend-test.log; exit ${PIPESTATUS[0]}
      - name: Notificar test
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          TEST_LINE=$(grep -oP 'Tests:\s+\d+\s+passed,\s+\d+\s+total' /tmp/backend-test.log 2>/dev/null || echo "")
          SUITE_LINE=$(grep -oP 'Test Suites:\s+\d+ passed.*\d+ total' /tmp/backend-test.log 2>/dev/null || echo "")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Pruebas Unitarias Backend (Jest)%0AEstado: ${ESTADO}%0A  ${SUITE_LINE}%0A  ${TEST_LINE}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build 2>&1 | tee /tmp/backend-build.log; exit ${PIPESTATUS[0]}
      - name: Notificar build
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Compilación Backend (Build)%0AEstado: ${ESTADO}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

name: Backend CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

defaults:
  run:
    working-directory: fitosanitario-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx eslint .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build

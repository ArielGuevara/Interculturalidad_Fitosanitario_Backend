name: Backend CI

on:
  workflow_call:

defaults:
  run:
    working-directory: fitosanitario-backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fitosanitario-backend/package-lock.json
      - run: npm ci
      - run: npm run build

  notify:
    needs: [lint, test, build]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notificar fallo a Telegram
        run: |
          MENSAJE="❌ Backend CI FALLÓ%0A"
          [ "${{ needs.lint.result }}" = "failure" ] && MENSAJE="${MENSAJE}  - Lint: ❌%0A"
          [ "${{ needs.test.result }}" = "failure" ] && MENSAJE="${MENSAJE}  - Test: ❌%0A"
          [ "${{ needs.build.result }}" = "failure" ] && MENSAJE="${MENSAJE}  - Build: ❌%0A"
          MENSAJE="${MENSAJE}Repo: ${{ github.repository }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MENSAJE"

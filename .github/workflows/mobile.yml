name: Mobile CI

on:
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx jest --passWithNoTests

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  notify:
    needs: [typecheck, test, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notificar resultado a Telegram
        run: |
          TC="${{ needs.typecheck.result }}"
          T="${{ needs.test.result }}"
          L="${{ needs.lint.result }}"
          EMOJI_TC=$( [ "$TC" = "success" ] && echo '✅' || echo '❌' )
          EMOJI_TEST=$( [ "$T" = "success" ] && echo '✅' || echo '❌' )
          EMOJI_LINT=$( [ "$L" = "success" ] && echo '✅' || echo '❌' )

          if [ "$TC" = "success" ] && [ "$T" = "success" ] && [ "$L" = "success" ]; then
            TITULO="✅ Mobile CI OK"
          else
            TITULO="❌ Mobile CI FALLÓ"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$TITULO%0A  Typecheck: $EMOJI_TC%0A  Test: $EMOJI_TEST%0A  Lint: $EMOJI_LINT%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

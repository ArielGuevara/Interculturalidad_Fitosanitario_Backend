name: Mobile CI

on:
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit 2>&1 | tee /tmp/mobile-tsc.log; exit ${PIPESTATUS[0]}
      - name: Notificar typecheck
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Mobile Typecheck%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx jest --passWithNoTests 2>&1 | tee /tmp/mobile-test.log; exit ${PIPESTATUS[0]}
      - name: Notificar test
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          TEST_LINE=$(grep -oP 'Tests:\s+\d+\s+passed,\s+\d+\s+total' /tmp/mobile-test.log 2>/dev/null || echo "")
          RESULTADOS=$(grep -oP 'Test Suites:\s+\d+ passed.*\d+ total' /tmp/mobile-test.log 2>/dev/null || echo "")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Mobile Test%0A  ${RESULTADOS}%0A  ${TEST_LINE}%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint 2>&1 | tee /tmp/mobile-lint.log; exit ${PIPESTATUS[0]}
      - name: Notificar lint
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Mobile Lint%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

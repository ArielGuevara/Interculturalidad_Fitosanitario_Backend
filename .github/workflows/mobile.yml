name: Mobile CI

on:
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    outputs:
      test_suites: ${{ steps.capture.outputs.test_suites }}
      test_tests: ${{ steps.capture.outputs.test_tests }}
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx jest --passWithNoTests 2>&1 | tee /tmp/mobile-test.log; exit ${PIPESTATUS[0]}
      - id: capture
        if: always()
        run: |
          echo "test_suites=$(grep -oP 'Test Suites: .+' /tmp/mobile-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "test_tests=$(grep -oP 'Tests: .+' /tmp/mobile-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-mobile
          path: fitosanitario-mobile/junit.xml

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  notify:
    needs: [typecheck, test, lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado Mobile
        run: |
          TC="${{ needs.typecheck.result }}"
          T="${{ needs.test.result }}"
          L="${{ needs.lint.result }}"
          S="${{ needs.test.outputs.test_suites }}"
          TS="${{ needs.test.outputs.test_tests }}"

          LINEAS=""
          LINEAS="${LINEAS}🔍 Fase 1: Typecheck (TS) → $( [ \"$TC\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"
          LINEAS="${LINEAS}🧪 Fase 2: Tests (Jest) → $( [ \"$T\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"
          [ -n "$S" ] && [ "$S" != "N/A" ] && LINEAS="${LINEAS}     📊 Suites: ${S}%0A"
          [ -n "$TS" ] && [ "$TS" != "N/A" ] && LINEAS="${LINEAS}     📊 Tests: ${TS}%0A"
          LINEAS="${LINEAS}📋 Fase 3: Lint (ESLint) → $( [ \"$L\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"

          if [ "$TC" = "success" ] && [ "$T" = "success" ] && [ "$L" = "success" ]; then
            TITULO="✅ Mobile - SUPERADO"
            ESTADO="🟢"
          else
            TITULO="❌ Mobile - FALLIDO"
            ESTADO="🔴"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="📱 *Mobile* | ${ESTADO} ${TITULO}%0A%0A${LINEAS}%0A🔗 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -d parse_mode="Markdown"

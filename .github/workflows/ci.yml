name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'fitosanitario-backend/**'
            frontend:
              - 'fitosanitario-frontend/**'
            mobile:
              - 'fitosanitario-mobile/**'

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml

  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend.yml

  mobile:
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    uses: ./.github/workflows/mobile.yml

  notify-telegram:
    needs: [detect-changes, backend, frontend, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notificar resultado global a Telegram
        run: |
          B="${{ needs.backend.result }}"
          F="${{ needs.frontend.result }}"
          M="${{ needs.mobile.result }}"

          if [ "$B" = "skipped" ] && [ "$F" = "skipped" ] && [ "$M" = "skipped" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="⚠️ CI - Sin cambios detectados%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"
            exit 0
          fi

          REPORTE=""
          FAIL=0
          if [ "$B" != "skipped" ]; then
            if [ "$B" = "success" ]; then REPORTE="${REPORTE}Backend: ✅%0A"; else REPORTE="${REPORTE}Backend: ❌%0A"; FAIL=1; fi
          fi
          if [ "$F" != "skipped" ]; then
            if [ "$F" = "success" ]; then REPORTE="${REPORTE}Frontend: ✅%0A"; else REPORTE="${REPORTE}Frontend: ❌%0A"; FAIL=1; fi
          fi
          if [ "$M" != "skipped" ]; then
            if [ "$M" = "success" ]; then REPORTE="${REPORTE}Mobile: ✅%0A"; else REPORTE="${REPORTE}Mobile: ❌%0A"; FAIL=1; fi
          fi

          if [ "$FAIL" = "0" ]; then
            STATUS="✅ CI COMPLETADO EXITOSAMENTE"
          else
            STATUS="❌ CI FALLÓ"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$STATUS%0A${REPORTE}Repo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

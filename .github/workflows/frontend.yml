name: Frontend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    outputs:
      test_suites: ${{ steps.capture.outputs.test_suites }}
      test_tests: ${{ steps.capture.outputs.test_tests }}
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false 2>&1 | tee /tmp/frontend-test.log; exit ${PIPESTATUS[0]}
      - id: capture
        if: always()
        run: |
          echo "test_suites=$(grep -oP 'Suites: .+' /tmp/frontend-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "test_tests=$(grep -oP 'Tests: .+' /tmp/frontend-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-frontend
          path: fitosanitario-frontend/junit.xml

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run build --configuration=production

  notify:
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado Frontend
        run: |
          L="${{ needs.lint.result }}"
          T="${{ needs.test.result }}"
          B="${{ needs.build.result }}"
          S="${{ needs.test.outputs.test_suites }}"
          TS="${{ needs.test.outputs.test_tests }}"

          LINEAS=""
          LINEAS="${LINEAS}$( [ \"$L\" = \"success\" ] && echo '✅' || echo '❌' ) Análisis Estático (ESLint)%0A"
          LINEAS="${LINEAS}$( [ \"$T\" = \"success\" ] && echo '✅' || echo '❌' ) Pruebas Unitarias (Angular)%0A"
          [ -n "$S" ] && [ "$S" != "N/A" ] && LINEAS="${LINEAS}     ${S}%0A"
          [ -n "$TS" ] && [ "$TS" != "N/A" ] && LINEAS="${LINEAS}     ${TS}%0A"
          LINEAS="${LINEAS}$( [ \"$B\" = \"success\" ] && echo '✅' || echo '❌' ) Compilación (Build)%0A"

          if [ "$L" = "success" ] && [ "$T" = "success" ] && [ "$B" = "success" ]; then
            TITULO="✅ [UPDATE] Frontend - Todas las fases SUPERADAS"
          else
            TITULO="❌ [UPDATE] Frontend - Fases FALLIDAS"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${TITULO}%0A${LINEAS}Rama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

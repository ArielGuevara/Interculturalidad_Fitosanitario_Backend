name: Frontend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    outputs:
      test_suites: ${{ steps.capture.outputs.test_suites }}
      test_tests: ${{ steps.capture.outputs.test_tests }}
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false 2>&1 | tee /tmp/frontend-test.log; exit ${PIPESTATUS[0]}
      - id: capture
        if: always()
        run: |
          echo "test_suites=$(grep -oP 'Suites: .+' /tmp/frontend-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "test_tests=$(grep -oP 'Tests: .+' /tmp/frontend-test.log 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
      # Nota: Angular @angular/build:unit-test no genera JUnit nativamente.
      # Si se requiere JUnit, migrar a vitest directo con config Angular.

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run build --configuration=production

  notify:
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notificar resultado Frontend
        run: |
          L="${{ needs.lint.result }}"
          T="${{ needs.test.result }}"
          B="${{ needs.build.result }}"
          S="${{ needs.test.outputs.test_suites }}"
          TS="${{ needs.test.outputs.test_tests }}"

          LINEAS=""
          LINEAS="${LINEAS}🔍 Fase 1: Lint (ESLint) → $( [ \"$L\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"
          LINEAS="${LINEAS}🧪 Fase 2: Tests (Angular) → $( [ \"$T\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"
          [ -n "$S" ] && [ "$S" != "N/A" ] && LINEAS="${LINEAS}     📊 Suites: ${S}%0A"
          [ -n "$TS" ] && [ "$TS" != "N/A" ] && LINEAS="${LINEAS}     📊 Tests: ${TS}%0A"
          LINEAS="${LINEAS}📦 Fase 3: Build → $( [ \"$B\" = \"success\" ] && echo '✅ SUPERADO' || echo '❌ FALLIDO' )%0A"

          if [ "$L" = "success" ] && [ "$T" = "success" ] && [ "$B" = "success" ]; then
            TITULO="✅ Frontend - SUPERADO"
            ESTADO="🟢"
          else
            TITULO="❌ Frontend - FALLIDO"
            ESTADO="🔴"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="🌐 *Frontend* | ${ESTADO} ${TITULO}%0A%0A${LINEAS}%0A🔗 ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -d parse_mode="Markdown"

name: Frontend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run build --configuration=production

  notify:
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notificar resultado a Telegram
        run: |
          L="${{ needs.lint.result }}"
          T="${{ needs.test.result }}"
          B="${{ needs.build.result }}"
          EMOJI_LINT=$( [ "$L" = "success" ] && echo '✅' || echo '❌' )
          EMOJI_TEST=$( [ "$T" = "success" ] && echo '✅' || echo '❌' )
          EMOJI_BUILD=$( [ "$B" = "success" ] && echo '✅' || echo '❌' )

          if [ "$L" = "success" ] && [ "$T" = "success" ] && [ "$B" = "success" ]; then
            TITULO="✅ Frontend CI OK"
          else
            TITULO="❌ Frontend CI FALLÓ"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$TITULO%0A  Lint: $EMOJI_LINT%0A  Test: $EMOJI_TEST%0A  Build: $EMOJI_BUILD%0ARepo: ${{ github.repository }}%0ABranch: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

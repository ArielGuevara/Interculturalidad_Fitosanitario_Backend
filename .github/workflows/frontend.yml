name: Frontend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint 2>&1 | tee /tmp/frontend-lint.log; exit ${PIPESTATUS[0]}
      - name: Notificar lint
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Análisis Estático Frontend (ESLint)%0AEstado: ${ESTADO}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false 2>&1 | tee /tmp/frontend-test.log; exit ${PIPESTATUS[0]}
      - name: Notificar test
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          SUITE_LINE=$(grep -oP 'Suites:.*\d+.*(passed|failed|total)' /tmp/frontend-test.log 2>/dev/null | head -1 || echo "")
          TEST_LINE=$(grep -oP 'Tests:.*\d+.*(passed|failed|total)' /tmp/frontend-test.log 2>/dev/null | head -1 || echo "")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Pruebas Unitarias Frontend (Angular)%0AEstado: ${ESTADO}%0A  ${SUITE_LINE}%0A  ${TEST_LINE}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run build --configuration=production 2>&1 | tee /tmp/frontend-build.log; exit ${PIPESTATUS[0]}
      - name: Notificar build
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          ESTADO=$( [ "${{ job.status }}" = "success" ] && echo 'SUPERADO' || echo 'FALLIDO' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} [UPDATE] Estado del Pipeline%0AFase: Compilación Frontend (Build)%0AEstado: ${ESTADO}%0ARama: ${{ github.ref_name }}%0AAutor: ${{ github.actor }}"

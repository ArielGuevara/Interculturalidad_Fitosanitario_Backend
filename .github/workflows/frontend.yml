name: Frontend CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint 2>&1 | tee /tmp/frontend-lint.log; exit ${PIPESTATUS[0]}
      - name: Notificar lint
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Frontend Lint%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --watch=false 2>&1 | tee /tmp/frontend-test.log; exit ${PIPESTATUS[0]}
      - name: Notificar test
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          TEST_LINE=$(grep -oP '(Suites|Tests):.*\d+.*(passed|failed)' /tmp/frontend-test.log 2>/dev/null | tail -5 || echo "")
          [ -z "$TEST_LINE" ] && TEST_LINE="Test completado"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Frontend Test%0A  ${TEST_LINE}%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitosanitario-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: fitosanitario-frontend/package-lock.json
      - run: npm ci
      - run: npm run build --configuration=production 2>&1 | tee /tmp/frontend-build.log; exit ${PIPESTATUS[0]}
      - name: Notificar build
        if: always()
        run: |
          EMOJI=$( [ "${{ job.status }}" = "success" ] && echo '✅' || echo '❌' )
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${EMOJI} Frontend Build%0ARepo: ${{ github.repository }}%0AAutor: ${{ github.actor }}%0AUrl: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
